<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css" integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">

    <!-- Font awesome -->
    <script src="https://kit.fontawesome.com/2c74dd7b7c.js" crossorigin="anonymous"></script>


    <link rel="stylesheet" href="css/style.css">
    <title>The Weather</title>
</head>
<body>
    <div class="side-menu">
        <a class="menu-hide"><img src="./img/icon/arrow-left-square.svg" alt="close"></a>
        <p>
            Приложение, с помощью которого вы можеет узнать о погоде в конкретном городе.
        </p>
        <p>
            Приложение реализовано с использованием fetch, API.
        </p>
    </div>
    <div class="button-menu">
        <span class="button-menu_item"></span>
        <span class="button-menu_item"></span>
        <span class="button-menu_item"></span>
    </div>

    <div class="main">
        <input class="form-control" type="text" placeholder="Ваше місто...">
        <button type="button" class="btn btn-outline-secondary btn-block button-watch">Дізнатися <i class="fas fa-search"></i></button>
        <div class="card" style="width: 100%; margin-top: 10px;">
            <ul class="list-group list-group-flush">
              <li class="list-group-item city"></li>
              <li class="list-group-item temp"></li>
              <li class="list-group-item feels"></li>
            </ul>
        </div>
    </div>

    <!-- Bootstrap, jQuery -->
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx" crossorigin="anonymous"></script>

    <script src="js/main.js"></script>
</body>
</html>
